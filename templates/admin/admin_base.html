<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
 
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
  <a class="navbar-brand d-flex align-items-center gap-3" href="#" style="padding:6px 0;">
 
  <!-- White Logo Badge -->
  <div style="
      width:48px;
      height:48px;
      background:#ffffff;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 18px rgba(0,0,0,0.18);
  ">
    <img src="{{ url_for('static', filename='images/logo.png') }}"
         alt="ATIKES Logo"
         style="
           width:40px;
           height:40px;
           object-fit:contain;
         ">
  </div>
 
  <!-- Brand Text -->
  <div style="
      display:flex;
      flex-direction:column;
      justify-content:center;
      line-height:1.1;
  ">
    <span style="
        font-size:20px;
        font-weight:800;
        color:#ffffff;
        letter-spacing:1.4px;
    ">
      ATIKES
    </span>
    <span style="
        font-size:13px;
        font-weight:500;
        color:rgba(255,255,255,0.85);
        margin-top:2px;
    ">
      HR Management
    </span>
  </div>
 
</a>
 
    <div class="ms-auto dropdown">
        <a class="btn btn-outline-light dropdown-toggle" href="#" role="button" id="settingsDropdown"
           data-bs-toggle="dropdown" aria-expanded="false">
            {{ session.email }}
        </a>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="settingsDropdown">
            <li><a class="dropdown-item" href="{{ url_for('settings.change_password') }}">Change Password</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="{{ url_for('auth.logout') }}">Logout</a></li>
        </ul>
    </div>
</nav>
 
<div class="d-flex">
    <!-- SIDEBAR -->
    <div class="bg-light sidebar p-3" style="width: 260px; min-height: 100vh;">
        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="{{ url_for('admin.dashboard') }}" class="nav-link sidebar-item {% if request.path == '/admin/dashboard' %}active{% endif %}">
                    Dashboard
                </a>
            </li>
 
            <li class="nav-item">
                <a href="{{ url_for('admin.employees') }}" class="nav-link sidebar-item {% if request.path == '/admin/employees' %}active{% endif %}">
                    Employees
                </a>
            </li>
 
            <li class="nav-item">
                <a href="{{ url_for('admin_attendance_bp.attendance_page') }}"
                   class="nav-link sidebar-item {% if '/admin/attendance' in request.path %}active{% endif %}">
                    Attendance
                </a>
            </li>
 
             <li class="nav-item">
    <a href="{{ url_for('admin_leaves.leave_management') }}"
       class="nav-link sidebar-item
       {% if request.path.startswith('/admin/leaves/leave-management')
          or request.path.startswith('/admin/leaves/pending-approvals')
          or request.path.startswith('/admin/leaves/summary')
          or request.path.startswith('/admin/leaves/approve')
          or request.path.startswith('/admin/leaves/reject') %}active{% endif %}">
        Leave Management
    </a>
</li>
 
         
<li class="nav-item">
    <a href="{{ url_for('admin_payroll.payroll_dashboard') }}"
       class="nav-link sidebar-item {% if '/admin/payroll' in request.path %}active{% endif %}">
        Payroll Management
    </a>
</li>
<li class="nav-item">
    <a href="{{ url_for('admin_attendance_bp.attendance_reports_page') }}"
       class="nav-link sidebar-item
       {% if '/admin/attendance/reports' in request.path %}active{% endif %}">
        Reports
    </a>
</li>
   <li class="nav-item dropdown">
    <a class="nav-link dropdown-toggle" href="#" id="settingsDropdown"
       role="button" data-bs-toggle="dropdown" aria-expanded="false">
        Settings
    </a>
    <ul class="dropdown-menu" aria-labelledby="settingsDropdown">
        <li><a class="dropdown-item" href="{{ url_for('admin.configure_approvals') }}">Configure Approvals</a></li>
       
    </ul>
</li>
        </ul>
    </div>
 
    <!-- MAIN CONTENT -->
    <div class="p-4" style="width: 100%;">
        {% block content %}{% endblock %}
    </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
